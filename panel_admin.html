
    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Panel Administrador - QRs</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
        <!-- Include jsPDF for PDF generation -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <style>
            :root {
                --glass-bg: rgba(255, 255, 255, 0.15);
                --glass-border: rgba(255, 255, 255, 0.3);
                --text-color: #ffffff;
            }
            body {
                font-family: 'Outfit', sans-serif;
                background: linear-gradient(135deg, #1a1c20 0%, #2d3136 100%);
                background-attachment: fixed;
                color: #ffffff;
                min-height: 100vh;
            }
            .glass-panel {
                background: rgba(45, 49, 54, 0.6);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border: 1px solid rgba(255, 107, 0, 0.3);
                border-radius: 24px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
                padding: 2.5rem;
            }
            .machine-card {
                background: rgba(30, 33, 38, 0.8);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-left: 4px solid #ff6b00;
                border-radius: 12px;
                transition: all 0.3s ease;
                overflow: hidden;
            }
            .machine-card:hover {
                transform: translateY(-5px);
                border-color: #ff6b00;
                box-shadow: 0 10px 20px rgba(255, 107, 0, 0.2);
            }
            .qr-container {
                background: white;
                padding: 10px;
                border-radius: 8px;
                display: inline-block;
                margin-top: 10px;
                cursor: pointer;
                /* Smaller QR display for admin UI */
            }
            .qr-container canvas, .qr-container img {
                margin: 0 auto;
                width: 120px;
                height: 120px;
                pointer-events: none; /* Let clicks pass to the <a> tag */
            }
            .btn-primary-glass {
                background: linear-gradient(45deg, #ff6b00 0%, #ff8800 100%);
                color: #fff;
                border: 1px solid #ff8800;
                box-shadow: 0 4px 15px rgba(255, 107, 0, 0.4);
                transition: 0.3s;
                border-radius: 10px;
                font-weight: bold;
                text-transform: uppercase;
                letter-spacing: 1px;
            }
            .btn-primary-glass:hover {
                box-shadow: 0 6px 20px rgba(255, 107, 0, 0.6);
                transform: translateY(-2px);
                color: white;
                background: linear-gradient(45deg, #ff8800 0%, #ff6b00 100%);
            }
            /* Header action section */
            .admin-actions {
                background: rgba(0,0,0,0.2);
                padding: 20px;
                border-radius: 15px;
                margin-bottom: 30px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
        </style>
    </head>
    <body>
        <div class="container py-5">
            <div class="glass-panel">
                <div class="admin-actions">
                    <h1 class="mb-0 fw-bold" style="letter-spacing: 1px;">⚙️ Panel Admin</h1>
                    <button class="btn btn-primary-glass px-4 py-3" onclick="descargarTodosPDF()">
                        🖨️ Descargar Todos los QRs (PDF)
                    </button>
                </div>
                
                <p class="text-white-50 mb-4">
                    Los QRs generados apuntan a: <code>https://eduardo-zepeda-j.github.io/qr_creator/index.html?id=[HASH_SEGURO]</code><br>
                    <strong>Nota:</strong> Ingresa a la carpeta <code>github_deploy/</code> y arrastra TODO su contenido a la raíz de tu GitHub Pages.
                </p>

                <div class="row g-4" id="grid-maquinas"></div>
            </div>
            
            <!-- Hidden container to render high-res QRs for the PDF -->
            <div id="hidden-qrs" style="display: none;"></div>
        </div>

        <script>
            const data = {"Maquina 1": {"id": "f56fcb73093dbf41"}, "Maquina 1 copy": {"id": "fc8112858e8a62c0"}, "Maquina 1 copy 10": {"id": "1650b56a19ba7576"}, "Maquina 1 copy 11": {"id": "014de30bd4871cfb"}, "Maquina 1 copy 12": {"id": "053024304ae48cb0"}, "Maquina 1 copy 13": {"id": "6e29fa2c22f7b4f1"}, "Maquina 1 copy 14": {"id": "0d3b912f518aa97f"}, "Maquina 1 copy 15": {"id": "a2704f4b0d54144a"}, "Maquina 1 copy 2": {"id": "edf941478c078d17"}, "Maquina 1 copy 3": {"id": "60801cacb043d72b"}, "Maquina 1 copy 4": {"id": "ada52595f2397ce7"}, "Maquina 1 copy 5": {"id": "08f78d69f1dccc24"}, "Maquina 1 copy 6": {"id": "504a080dc8d2ff4d"}, "Maquina 1 copy 7": {"id": "42a4b1d5e025a3cc"}, "Maquina 1 copy 8": {"id": "e19455f03205220d"}, "Maquina 1 copy 9": {"id": "cf93df9b84ce313b"}, "Maquina 2": {"id": "db100b8c92caa4ea"}, "Maquina 2 copy": {"id": "0a11ac92a8f55dde"}, "Maquina 2 copy 10": {"id": "0caf5404b4092c7b"}, "Maquina 2 copy 11": {"id": "01598832540ed9fc"}, "Maquina 2 copy 12": {"id": "2bb39efe28b15df0"}, "Maquina 2 copy 13": {"id": "8545541bf2c9ded4"}, "Maquina 2 copy 14": {"id": "e3851e64922af2a2"}, "Maquina 2 copy 15": {"id": "9191808f2bac01ba"}, "Maquina 2 copy 2": {"id": "2815ec0ecf281a3f"}, "Maquina 2 copy 3": {"id": "d482f01b3e93bf2c"}, "Maquina 2 copy 4": {"id": "e759d93623a15e7b"}, "Maquina 2 copy 5": {"id": "e106b9bfc73b2aa5"}, "Maquina 2 copy 6": {"id": "21876398a0344ae9"}, "Maquina 2 copy 7": {"id": "f5373f637221bdad"}, "Maquina 2 copy 8": {"id": "52acefb68a8befe1"}, "Maquina 2 copy 9": {"id": "ddfedebf0c75bc78"}, "Maquina 3": {"id": "423546db27d77bff"}, "Maquina 3 copy": {"id": "eb9509e54119e047"}, "Maquina 3 copy 10": {"id": "c89c77ff42350c84"}, "Maquina 3 copy 11": {"id": "e8b4591a2a78dc9f"}, "Maquina 3 copy 12": {"id": "c146842f2212a43f"}, "Maquina 3 copy 13": {"id": "9b981ae58d09afb5"}, "Maquina 3 copy 14": {"id": "f4de7109d24d4838"}, "Maquina 3 copy 15": {"id": "c4b539a1ede0268e"}, "Maquina 3 copy 2": {"id": "35306392cd1a0943"}, "Maquina 3 copy 3": {"id": "08e26ea4d2a33c6f"}, "Maquina 3 copy 4": {"id": "553ac192357fb48c"}, "Maquina 3 copy 5": {"id": "951060fc8a0fc232"}, "Maquina 3 copy 6": {"id": "11cd2eb9ac091fa8"}, "Maquina 3 copy 7": {"id": "339e3e6d4ab2494a"}, "Maquina 3 copy 8": {"id": "5c1a23c21ce00d9d"}, "Maquina 3 copy 9": {"id": "3850cd5b32f13adf"}, "Maquina 4": {"id": "22d4f95f884a8942"}, "Maquina 4 copy": {"id": "0a9a5b19a5726c1e"}, "Maquina 4 copy 10": {"id": "26c8dff77400b40c"}, "Maquina 4 copy 11": {"id": "bd6b5b9dd7642739"}, "Maquina 4 copy 12": {"id": "bc7e78698d385916"}, "Maquina 4 copy 13": {"id": "407675cc945b992f"}, "Maquina 4 copy 14": {"id": "74d514357e8136d6"}, "Maquina 4 copy 15": {"id": "d48873b7f8d869fe"}, "Maquina 4 copy 2": {"id": "f72c02ef161cbacf"}, "Maquina 4 copy 3": {"id": "cdf464f4a132b756"}, "Maquina 4 copy 4": {"id": "bd86eefef2775c55"}, "Maquina 4 copy 5": {"id": "bb8c1ce4f0c1ee29"}, "Maquina 4 copy 6": {"id": "cdd4d1a2bec95be8"}, "Maquina 4 copy 7": {"id": "1edec8b5118a2b83"}, "Maquina 4 copy 8": {"id": "3b136655b74e394f"}, "Maquina 4 copy 9": {"id": "c7da1b063df60711"}, "Maquina 5": {"id": "763adef50b200ee6"}, "Maquina 5 copy": {"id": "660ced5d8440123e"}, "Maquina 5 copy 10": {"id": "eceb61baa688800a"}, "Maquina 5 copy 11": {"id": "38258b6ceba15962"}, "Maquina 5 copy 12": {"id": "decc6c2df4cc4b98"}, "Maquina 5 copy 13": {"id": "3df4ab0b6fb4db79"}, "Maquina 5 copy 14": {"id": "ba112e9a32f4e20f"}, "Maquina 5 copy 15": {"id": "2faa65caa1115504"}, "Maquina 5 copy 2": {"id": "a0318edba32d13f7"}, "Maquina 5 copy 3": {"id": "3ce0c2fb361e4bd7"}, "Maquina 5 copy 4": {"id": "eb775cd8877c1e0c"}, "Maquina 5 copy 5": {"id": "0702d3cbd1da8eeb"}, "Maquina 5 copy 6": {"id": "e6e983cacc5b1720"}, "Maquina 5 copy 7": {"id": "5e2f84574d746763"}, "Maquina 5 copy 8": {"id": "3fc04494242288b7"}, "Maquina 5 copy 9": {"id": "0852ca298910b3ae"}};
            const BASE_URL = "https://eduardo-zepeda-j.github.io/qr_creator/index.html";

            function generarQR(text, containerId, size=120) {
                const container = document.getElementById(containerId);
                if (!container) return null;
                container.innerHTML = '';
                if (!text) return null;
                return new QRCode(container, {
                    text: text,
                    width: size,
                    height: size,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            }

            async function descargarTodosPDF() {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
                
                // Config A4
                const pageWidth = 210;
                const pageHeight = 297;
                
                // Config Grid (Ej: 3 columnas x 4 filas = 12 QRs por página)
                const marginX = 20;
                const marginY = 20;
                const cols = 3;
                const rows = 4;
                
                const cellW = (pageWidth - marginX * 2) / cols; // Ancho celda aprox 56mm
                const cellH = (pageHeight - marginY * 2) / rows; // Alto celda aprox 64mm
                
                const qrSize = 40; // Tamaño del QR en mm (bastante leíble)
                
                let currentItem = 0;
                const maquinas = Object.keys(data);
                
                if(maquinas.length === 0) {
                    alert("No hay máquinas para exportar.");
                    return;
                }

                // Generate high res dataURLs
                const hiddenContainer = document.getElementById('hidden-qrs');
                
                for (let i = 0; i < maquinas.length; i++) {
                    const maquina = maquinas[i];
                    // Link to user dashboard using secure ID
                    const urlDestino = BASE_URL + "?id=" + encodeURIComponent(data[maquina].id);
                    
                    // Create temporary div for high res QR (500x500 px)
                    const tempDiv = document.createElement('div');
                    const tempId = 'hq-qr-' + i;
                    tempDiv.id = tempId;
                    hiddenContainer.appendChild(tempDiv);
                    
                    generarQR(urlDestino, tempId, 500);
                    
                    // Wait slightly for canvas to render
                    await new Promise(r => setTimeout(r, 50));
                    
                    const canvas = tempDiv.querySelector('canvas');
                    const qrDataUrl = canvas.toDataURL("image/png");
                    
                    // Positioning math
                    const rowIndex = Math.floor(currentItem / cols) % rows;
                    const colIndex = currentItem % cols;
                    
                    // Add new page if needed
                    if (currentItem > 0 && rowIndex === 0 && colIndex === 0) {
                        doc.addPage();
                    }
                    
                    const x = marginX + (colIndex * cellW);
                    const y = marginY + (rowIndex * cellH);
                    
                    // Draw crop marks (guias de recorte)
                    doc.setDrawColor(200, 200, 200);
                    doc.setLineWidth(0.2);
                    // Top-Left
                    doc.line(x, y-2, x, y+2); 
                    doc.line(x-2, y, x+2, y);
                    // Top-Right
                    doc.line(x+cellW, y-2, x+cellW, y+2); 
                    doc.line(x+cellW-2, y, x+cellW+2, y);
                    // Bottom-Left
                    doc.line(x, y+cellH-2, x, y+cellH+2); 
                    doc.line(x-2, y+cellH, x+2, y+cellH);
                    // Bottom-Right
                    doc.line(x+cellW, y+cellH-2, x+cellW, y+cellH+2); 
                    doc.line(x+cellW-2, y+cellH, x+cellW+2, y+cellH);
                    
                    // Draw QR centered in cell
                    const qrX = x + (cellW - qrSize) / 2;
                    const qrY = y + (cellH - qrSize) / 2 - 5; // A bit higher to leave room for text
                    doc.addImage(qrDataUrl, "PNG", qrX, qrY, qrSize, qrSize);
                    
                    // Draw Machine Name below QR
                    doc.setFontSize(10);
                    doc.setTextColor(0, 0, 0);
                    // Split text if too long
                    const textLines = doc.splitTextToSize(maquina, cellW - 5);
                    doc.text(textLines, x + cellW/2, qrY + qrSize + 5, { align: "center" });
                    
                    currentItem++;
                    hiddenContainer.innerHTML = ''; // clean up
                }
                
                doc.save("QRs_Para_Imprimir.pdf");
            }

            function cargarMaquinasAdmin() {
                const grid = document.getElementById('grid-maquinas');
                grid.innerHTML = '';
                
                Object.keys(data).forEach((maquina, index) => {
                    const qrId = 'qr-' + index;
                    const urlDestino = BASE_URL + "?id=" + encodeURIComponent(data[maquina].id);
                    
                    const col = document.createElement('div');
                    col.className = 'col-lg-3 col-md-4 col-sm-6'; // Smaller cards for more density
                    
                    let htmlCard = `
                        <div class="card h-100 machine-card p-3 text-center">
                            <h4 class="card-title h6 fw-bold mb-2 text-white">${maquina}</h4>
                            <a href="${urlDestino}" target="_blank" class="text-decoration-none" title="Haz clic para abrir el Dashboard de esta máquina">
                                <div class="qr-container mx-auto shadow-sm" style="transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'" id="${qrId}"></div>
                            </a>
                            <small class="text-white-50 mt-2" style="font-size: 0.7rem;">Clic en el QR para ir al Dashboard</small>
                        </div>`;
                        
                    col.innerHTML = htmlCard;
                    grid.appendChild(col);
                    
                    setTimeout(() => generarQR(urlDestino, qrId, 120), 100);
                });
            }

            cargarMaquinasAdmin();
        </script>
    </body>
    </html>
